<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伝達核v1.0 動物軸版 ― ソロ切片プロトタイプ</title>
<style>
  :root{
    --bg:#101418; --panel:#1a2027; --panel2:#212934; --line:#2e3742;
    --text:#e7edf3; --muted:#8fa0b3; --accent:#4fb2e8; --good:#4fd18a;
    --bad:#e85f5f; --warn:#e8b34f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
  }
  #app{ max-width:1080px; margin:0 auto; padding:16px 16px 80px; }
  h1{ font-size:1.15rem; margin:8px 0 4px; }
  h2{ font-size:1rem; margin:0 0 8px; color:var(--accent); }
  .sub{ color:var(--muted); font-size:0.85rem; margin-bottom:16px; }
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:12px; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .btn{
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:8px; padding:10px 16px; font-size:0.95rem; cursor:pointer;
  }
  .btn:hover{ border-color:var(--accent); }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .btn.primary{ background:#1d4a63; border-color:var(--accent); }
  .btn.danger{ background:#4a1d1d; border-color:var(--bad); }
  .btn.danger.armed{ background:var(--bad); color:#1a0000; font-weight:bold; }
  input[type=text]{
    background:#0b0e12; color:var(--text); border:1px solid var(--line); border-radius:6px;
    padding:8px 10px; font-size:0.9rem; font-family:ui-monospace,Consolas,monospace;
  }
  label.radio{ display:flex; align-items:center; gap:4px; font-size:0.9rem; }
  .statbar{ display:flex; gap:18px; flex-wrap:wrap; font-size:0.9rem; margin-bottom:8px; }
  .stat{ background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:6px 12px; }
  .stat b{ color:var(--accent); }
  .animalrow{ display:flex; gap:10px; flex-wrap:wrap; margin:10px 0; }
  .animal{
    min-width:64px; height:52px; padding:0 10px; border-radius:8px; background:var(--panel2);
    border:2px solid var(--line); display:flex; align-items:center; justify-content:center;
    font-size:0.95rem; cursor:pointer; user-select:none;
  }
  .animal.disabled{ cursor:not-allowed; opacity:0.35; }
  .animal.static{ cursor:default; }
  .animal.static:hover{ border-color:var(--line); transform:none; }
  .animal:hover:not(.disabled):not(.static){ border-color:var(--accent); transform:translateY(-2px); }
  .animal.mini{ height:34px; font-size:0.85rem; }
  table{ width:100%; border-collapse:collapse; font-size:0.85rem; }
  th,td{ text-align:center; padding:4px 6px; border-bottom:1px solid var(--line); }
  th{ color:var(--muted); font-weight:normal; }
  #log{
    background:#0b0e12; border:1px solid var(--line); border-radius:8px; padding:8px 10px;
    max-height:180px; overflow-y:auto; font-family:ui-monospace,Consolas,monospace; font-size:0.78rem;
    white-space:pre-wrap; line-height:1.5;
  }
  #errorBanner{
    position:fixed; top:0; left:0; right:0; background:var(--bad); color:#1a0000;
    padding:10px 16px; font-weight:bold; z-index:100; text-align:center;
  }
  #toast{
    position:fixed; bottom:56px; left:50%; transform:translateX(-50%);
    background:var(--good); color:#062; padding:8px 16px; border-radius:8px; font-weight:bold; z-index:100;
  }
  #verBadge{
    position:fixed; right:10px; bottom:10px; background:var(--panel2); border:1px solid var(--line);
    color:var(--muted); font-size:0.72rem; padding:4px 8px; border-radius:6px; z-index:50;
  }
  .axis-memo-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .axis-memo-cell{
    cursor:pointer; user-select:none; font-weight:bold; padding:8px 10px; border-radius:8px;
    background:var(--panel2); border:1px solid var(--line); min-width:90px; text-align:center;
  }
  .axis-memo-cell.x{ color:var(--bad); border-color:var(--bad); }
  .axis-memo-cell.o{ color:var(--good); border-color:var(--good); }
  .hintline{ font-size:0.85rem; margin:2px 0; }
  .hintline .tag{ display:inline-block; padding:1px 6px; border-radius:8px; font-size:0.72rem; margin-right:6px; }
  .tag.mine{ background:#1d4a63; }
  .tag.theirs{ background:#4a2f1d; }
  .result-big{ font-size:1.3rem; font-weight:bold; margin:10px 0; }
  #selftestResult{ font-size:0.85rem; white-space:pre-wrap; font-family:ui-monospace,Consolas,monospace; }
  .gauge{ width:100%; max-width:240px; height:14px; background:#0b0e12; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .gauge-fill{ height:100%; background:var(--good); transition:width 0.2s linear; }
  .gauge-fill.warn{ background:var(--warn); }
  .gauge-fill.bad{ background:var(--bad); }
</style>

<body>
<div id="errorBanner" hidden></div>
<div id="toast" hidden></div>
<div id="app"></div>

<script>
'use strict';

/* ============================================================
   伝達核v1.0 動物軸版 ソロ切片プロトタイプ
   典拠: proto/核定義_伝達核v1.0_動物軸版_凍結_2026-07-17.md（§1〜5,6-1 凍結）
   ============================================================ */

const VER = "v1.0.0";

/* ---------------- 凍結データ（§2。改変・追加禁止） ---------------- */
const ANIMALS = ['ゾウ','ウマ','ライオン','オオカミ','サル','ネコ','ウサギ','ネズミ'];
const AXES = ['体重','速さ','寿命','危険度','かわいさ','人気','五十音','群れ'];
const AXIS_ORDER = {
  '体重':    ['ゾウ','ウマ','ライオン','オオカミ','サル','ネコ','ウサギ','ネズミ'],
  '速さ':    ['ウマ','ライオン','ウサギ','オオカミ','ネコ','ゾウ','サル','ネズミ'],
  '寿命':    ['ゾウ','ウマ','サル','ライオン','ネコ','オオカミ','ウサギ','ネズミ'],
  '危険度':  ['ライオン','ゾウ','オオカミ','ウマ','サル','ネズミ','ネコ','ウサギ'],
  'かわいさ':['ネコ','ウサギ','ネズミ','サル','ウマ','ゾウ','オオカミ','ライオン'],
  '人気':    ['ネコ','ウサギ','ウマ','ゾウ','サル','ライオン','オオカミ','ネズミ'],
  '五十音':  ['ライオン','ネズミ','ネコ','ゾウ','サル','オオカミ','ウマ','ウサギ'],
  '群れ':    ['ネズミ','ウサギ','サル','ウマ','オオカミ','ゾウ','ライオン','ネコ'],
};
const RANK_OF = {};
AXES.forEach(axis=>{
  RANK_OF[axis] = {};
  AXIS_ORDER[axis].forEach((animal,i)=>{ RANK_OF[axis][animal] = 8 - i; });
});
const HINT_TABLE = [
  {axis:'体重', tier:'遠', text:'一緒にエレベーターに乗りたくない順', interp:['体重','危険度']},
  {axis:'体重', tier:'遠', text:'踏まれたら終わりな順', interp:['体重','危険度']},
  {axis:'体重', tier:'中', text:'体重計が悲鳴を上げる順', interp:['体重']},
  {axis:'体重', tier:'直', text:'重い順', interp:['体重']},
  {axis:'速さ', tier:'遠', text:'逃げても無駄な順', interp:['速さ','危険度']},
  {axis:'速さ', tier:'遠', text:'運動会で頼りになる順', interp:['速さ']},
  {axis:'速さ', tier:'中', text:'徒競走で勝つ順', interp:['速さ']},
  {axis:'速さ', tier:'直', text:'足が速い順', interp:['速さ']},
  {axis:'寿命', tier:'遠', text:'長い付き合いになる順', interp:['寿命','人気']},
  {axis:'寿命', tier:'遠', text:'おじいちゃんになるまでが長い順', interp:['寿命']},
  {axis:'寿命', tier:'中', text:'還暦に近づける順', interp:['寿命']},
  {axis:'寿命', tier:'直', text:'寿命が長い順', interp:['寿命']},
  {axis:'危険度', tier:'遠', text:'夜道で会いたくない順', interp:['危険度','体重']},
  {axis:'危険度', tier:'遠', text:'保険料が上がりそうな順', interp:['危険度']},
  {axis:'危険度', tier:'中', text:'猛獣注意の看板になる順', interp:['危険度','体重']},
  {axis:'危険度', tier:'直', text:'人間にとって危険な順', interp:['危険度']},
  {axis:'かわいさ', tier:'遠', text:'写真フォルダが埋まりそうな順', interp:['かわいさ','人気']},
  {axis:'かわいさ', tier:'遠', text:'ぬいぐるみにしたい順', interp:['かわいさ','人気']},
  {axis:'かわいさ', tier:'中', text:'頬がゆるむ順', interp:['かわいさ']},
  {axis:'かわいさ', tier:'直', text:'かわいい順', interp:['かわいさ']},
  {axis:'人気', tier:'遠', text:'握手会に行列ができる順', interp:['人気','かわいさ']},
  {axis:'人気', tier:'遠', text:'テレビ出演が多い順', interp:['人気']},
  {axis:'人気', tier:'中', text:'ファンが多い順', interp:['人気','かわいさ']},
  {axis:'人気', tier:'直', text:'人気が高い順', interp:['人気']},
  {axis:'五十音', tier:'遠', text:'図鑑の後ろの方にいる順', interp:['五十音']},
  {axis:'五十音', tier:'遠', text:'出席番号が大きい順', interp:['五十音']},
  {axis:'五十音', tier:'中', text:'辞書で後に出てくる順', interp:['五十音']},
  {axis:'五十音', tier:'直', text:'五十音で後ろの順', interp:['五十音']},
  {axis:'群れ', tier:'遠', text:'一匹でいるところを見ない順', interp:['群れ']},
  {axis:'群れ', tier:'遠', text:'大家族な順', interp:['群れ']},
  {axis:'群れ', tier:'中', text:'集団行動が得意な順', interp:['群れ']},
  {axis:'群れ', tier:'直', text:'群れが大きい順', interp:['群れ']},
];
const HINT_SCHEDULE = { 1:{side:'A', tier:'遠'}, 2:{side:'B', tier:'遠'}, 3:{side:'A', tier:'中'}, 4:{side:'B', tier:'直'} };

const BET_OPTIONS = [1,2,3,5];
const MAX_RAISES = 3;
const INITIAL_LIFE = 30;
const ROUNDS_TOTAL = 8;
const DRAIN_INTERVALS = { off:null, slow:30000, standard:15000, fast:7000 };

/* ---------------- シード付き乱数 ---------------- */
function xmur3(str){
  let h = 1779033703 ^ str.length;
  for (let i=0;i<str.length;i++){
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return function(){
    h = Math.imul(h ^ (h>>>16), 2246822507);
    h = Math.imul(h ^ (h>>>13), 3266489909);
    h ^= h>>>16;
    return h >>> 0;
  };
}
function mulberry32(a){
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a>>>15), 1 | a);
    t = (t + Math.imul(t ^ (t>>>7), 61 | t)) ^ t;
    return ((t ^ (t>>>14)) >>> 0) / 4294967296;
  };
}
function makeRng(seedStr){ return mulberry32(xmur3(String(seedStr))()); }
function randomSeedString(){
  const chars = '0123456789abcdefghijklmnopqrstuvwxyz';
  let out = '';
  for (let i=0;i<10;i++) out += chars[Math.floor(Math.random()*chars.length)];
  return out;
}
function shuffleWithRng(arr, rng){
  const a = arr.slice();
  for (let i=a.length-1;i>0;i--){
    const j = Math.floor(rng()*(i+1));
    const t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}

/* ==================== マッチ設定 ==================== */
function newMatch(seedStr, drainSpeed){
  const rng = makeRng(seedStr);
  const trueAxis = AXES[Math.floor(rng()*AXES.length)];
  const others = shuffleWithRng(AXES.filter(a=>a!==trueAxis), rng);
  const anchorsA = others.slice(0,2);
  const anchorsB = others.slice(2,4);
  return {
    seed: seedStr, rng, trueAxis, anchorsA, anchorsB,
    drainSpeed: drainSpeed || 'off',
    usedHintTexts: new Set(),
    publicHints: [], publicConstraints: [], roundHistory: [],
    usedAnimals: { human:[], npc:[] },
    hand: { human: ANIMALS.slice(), npc: ANIMALS.slice() },
    chips: { human: INITIAL_LIFE, npc: INITIAL_LIFE }, // 命
    score: { human: 0, npc: 0 }, // 得点（別勘定）
    vanished: 0, // ドレイン等で消滅した命の総量
    pot: 0,
    roundNum: 0,
    globalRoundIndex: 0,
    candidateSetA: AXES.filter(a=>!anchorsA.includes(a)),
    candidateSetB: AXES.filter(a=>!anchorsB.includes(a)),
    matchLog: [], matchOver: false, result: null, endCause: null,
    round: null,
    seatTypes: null, // {human:'HUMAN'|'NPC_AUTO', npc:'NPC_AUTO'}
  };
}
function log(m, text){ m.matchLog.push(text); }
function nameOf(seat){ return seat==='human' ? 'あなた' : 'NPC'; }

/* ---------------- 伝達者スクリプト（§6-1） ---------------- */
function pickHint(m, tier){
  const candidates = HINT_TABLE.filter(h => h.axis===m.trueAxis && h.tier===tier && !m.usedHintTexts.has(h.text));
  if (!candidates.length) throw new Error('ヒント候補が枯渇（データ構造上通常発生しない状態）');
  return candidates[Math.floor(m.rng()*candidates.length)];
}
function commitHint(m, side, hint){
  m.usedHintTexts.add(hint.text);
  m.publicHints.push({side, round:m.roundNum, hint});
  m.candidateSetA = m.candidateSetA.filter(a=>hint.interp.includes(a));
  m.candidateSetB = m.candidateSetB.filter(a=>hint.interp.includes(a));
  log(m, `[R${m.roundNum}] ヒント(${side==='A'?'味方':'敵'}): ${hint.text}`);
}
function commitConstraint(m, winnerAnimal, loserAnimal){
  m.publicConstraints.push({winner:winnerAnimal, loser:loserAnimal, round:m.roundNum});
  const pred = a => RANK_OF[a][winnerAnimal] > RANK_OF[a][loserAnimal];
  m.candidateSetA = m.candidateSetA.filter(pred);
  m.candidateSetB = m.candidateSetB.filter(pred);
}

/* ---------------- NPC思考ロジック（自席・敵席どちらにも汎用） ---------------- */
const NPC_MIX_RATE = 0.15; // 実装裁量：v0.1と同一値を踏襲
function autoChooseAnimal(m, seat){
  const isHuman = seat==='human';
  const remaining = m.hand[seat];
  const oppRemaining = m.hand[isHuman ? 'npc' : 'human'];
  const candidateSet = isHuman ? m.candidateSetA : m.candidateSetB;
  if (remaining.length===1 || m.rng() < NPC_MIX_RATE){
    return remaining[Math.floor(m.rng()*remaining.length)];
  }
  let best = remaining[0], bestScore = -1;
  for (const s of remaining){
    let winSum = 0;
    for (const axis of candidateSet){
      let wc = 0;
      for (const t of oppRemaining) if (RANK_OF[axis][s] > RANK_OF[axis][t]) wc++;
      winSum += wc / oppRemaining.length;
    }
    const score = winSum / candidateSet.length;
    if (score > bestScore){ bestScore = score; best = s; }
  }
  return best;
}
function autoConfidence(m, seat, animal){
  const isHuman = seat==='human';
  const oppRemaining = m.hand[isHuman ? 'npc' : 'human'];
  const candidateSet = isHuman ? m.candidateSetA : m.candidateSetB;
  let winSum = 0;
  for (const axis of candidateSet){
    let wc = 0;
    for (const t of oppRemaining) if (RANK_OF[axis][animal] > RANK_OF[axis][t]) wc++;
    winSum += wc / oppRemaining.length;
  }
  return winSum / candidateSet.length;
}
function nearestAvailable(desired, list){
  return list.slice().sort((a,b)=>Math.abs(a-desired)-Math.abs(b-desired))[0];
}
// 確信度→行動しきい値（実装裁量）：
// v0.1のしきい値をそのまま踏襲したところ、自動テストで100%のマッチが
// 8ラウンド完走前の命枯渇で終わる結果になった（トレースログで確認：初期30命が
// R1-R2だけの大型ベット戦＋2連続引き分けの持ち越しポットで両者0命同時死亡）。
// v0.1は「勝てば賭けた命が戻る」経済だったが、v1.0は燃焼式（賭けた命は勝敗に関わらず戻らない）
// のため、同じ攻撃性のしきい値は経済的に釣り合わない。燃焼式の重みを反映し、
// 特にレイズ（最も速く消耗する行動）の閾値を引き上げて再調整した。
function autoDecideAction(m, seat, opts){
  const animal = m.round.animalsPlayed[seat];
  const conf = autoConfidence(m, seat, animal);
  if (opts.kind==='open'){
    const bets = extractValues(opts.options,'bet');
    if (conf<0.45 || !bets.length) return {action:'check'};
    const desired = conf<0.60 ? 1 : (conf<0.72 ? 2 : (conf<0.85 ? 3 : 5));
    return {action:'bet', amount: nearestAvailable(desired, bets)};
  }
  const raises = extractValues(opts.options,'raise');
  if (conf<0.35) return {action:'fold'};
  if (conf<0.65 || !raises.length) return {action:'call'};
  const desired = conf<0.80 ? 1 : (conf<0.92 ? 3 : 5);
  return {action:'raise', amount: nearestAvailable(desired, raises)};
}

/* ==================== ラウンド進行エンジン ==================== */
function beginRound(m){
  m.roundNum += 1;
  m.globalRoundIndex += 1;
  const firstMover = (m.globalRoundIndex % 2 === 1) ? 'human' : 'npc';

  const sched = HINT_SCHEDULE[m.roundNum];
  if (sched){
    const hint = pickHint(m, sched.tier);
    commitHint(m, sched.side, hint);
  }

  m.chips.human -= 1; m.chips.npc -= 1; m.pot += 2;
  log(m, `[R${m.roundNum}] アンティ 各1（燃焼・ポット${m.pot}）。先手=${nameOf(firstMover)}`);
  if (m.chips.human<=0 || m.chips.npc<=0){
    finalizeByElimination(m, 'ante');
    return;
  }

  m.round = {
    firstMover, toAct:null, currentBet:0, contributions:{human:0,npc:0},
    raiseCount:0, history:[], animalsPlayed:{human:null,npc:null}, phase:'select_cards',
  };
  ['human','npc'].forEach(seat=>{
    if (m.seatTypes[seat] !== 'HUMAN'){
      const a = autoChooseAnimal(m, seat);
      const idx = m.hand[seat].indexOf(a);
      m.hand[seat].splice(idx,1);
      m.round.animalsPlayed[seat] = a;
    }
  });
  if (m.round.animalsPlayed.human!==null && m.round.animalsPlayed.npc!==null){
    startBetting(m);
  }
}

function submitHumanAnimal(m, animal){
  const idx = m.hand.human.indexOf(animal);
  if (idx<0) throw new Error('手札にない動物です');
  m.hand.human.splice(idx,1);
  m.round.animalsPlayed.human = animal;
  if (m.round.animalsPlayed.human!==null && m.round.animalsPlayed.npc!==null){
    startBetting(m);
  }
}

function startBetting(m){
  const r = m.round;
  r.phase = 'betting';
  r.toAct = r.firstMover;
  log(m, `[R${m.roundNum}] 両者提示完了。ベット開始（先手=${nameOf(r.firstMover)}）`);
}

function extractValues(options, prefix){
  return options.filter(o=>o.startsWith(prefix+':')).map(o=>Number(o.split(':')[1]));
}
function computeOptions(m){
  const r = m.round;
  const actor = r.toAct;
  const remaining = m.chips[actor];
  if (r.currentBet === 0){
    const bets = BET_OPTIONS.filter(v=>v<=remaining);
    return { kind:'open', options:['check', ...bets.map(v=>'bet:'+v)] };
  }
  const toCall = r.currentBet - r.contributions[actor];
  const canRaise = r.raiseCount < MAX_RAISES;
  const raises = canRaise ? BET_OPTIONS.filter(rv => (toCall+rv) <= remaining) : [];
  return { kind:'facing', options:['fold','call', ...raises.map(v=>'raise:'+v)], toCall };
}

function submitAction(m, action, amount){
  const r = m.round;
  if (!r || r.phase!=='betting') throw new Error('ベットフェーズではありません');
  const actor = r.toAct; const other = actor==='human' ? 'npc' : 'human';
  const remaining = m.chips[actor];

  if (action==='check'){
    if (r.currentBet !== 0) throw new Error('ベットが存在するためチェックできません');
    r.history.push({player:actor, action:'check'});
    log(m, `[R${m.roundNum}] ${nameOf(actor)}: チェック`);
    const priorChecks = r.history.filter(h=>h.action==='check').length;
    if (priorChecks>=2){
      finishRound(m, 'showdown');
    } else {
      r.toAct = other;
    }
  } else if (action==='bet'){
    const v = amount;
    if (r.currentBet!==0) throw new Error('既にベットが存在します');
    if (!BET_OPTIONS.includes(v) || v>remaining) throw new Error('不正なベット額です');
    r.contributions[actor]+=v; m.chips[actor]-=v; m.pot+=v; r.currentBet=v;
    r.history.push({player:actor, action:'bet', amount:v});
    log(m, `[R${m.roundNum}] ${nameOf(actor)}: ベット ${v}`);
    r.toAct = other;
  } else if (action==='call'){
    if (r.currentBet===0) throw new Error('コール対象がありません');
    const toCall = r.currentBet - r.contributions[actor];
    const pay = Math.min(toCall, remaining);
    r.contributions[actor]+=pay; m.chips[actor]-=pay; m.pot+=pay;
    const allIn = pay < toCall;
    r.history.push({player:actor, action:'call', amount:pay, allIn});
    log(m, `[R${m.roundNum}] ${nameOf(actor)}: コール ${pay}${allIn?'（オールイン）':''}`);
    finishRound(m, 'showdown');
  } else if (action==='raise'){
    if (r.currentBet===0) throw new Error('レイズ対象がありません');
    if (r.raiseCount>=MAX_RAISES) throw new Error('レイズ上限に達しています');
    const rv = amount;
    const toCall = r.currentBet - r.contributions[actor];
    const total = toCall+rv;
    if (!BET_OPTIONS.includes(rv) || total>remaining) throw new Error('不正なレイズ額です');
    r.contributions[actor]+=total; m.chips[actor]-=total; m.pot+=total;
    r.currentBet = r.contributions[actor];
    r.raiseCount+=1;
    r.history.push({player:actor, action:'raise', amount:rv, totalPaid:total});
    log(m, `[R${m.roundNum}] ${nameOf(actor)}: レイズ +${rv}（支払${total}）`);
    r.toAct = other;
  } else if (action==='fold'){
    r.history.push({player:actor, action:'fold'});
    log(m, `[R${m.roundNum}] ${nameOf(actor)}: フォールド`);
    finishRound(m, 'fold', other);
  } else {
    throw new Error('不明なアクション: '+action);
  }
}

// 暫定選択：フォールド時は、両者の動物が偶然一致していても「引き分け」とはせずフォールドを優先する
// （§4-5では同一動物の引き分けが独立した箇条書きになっているが、v0.1の凍結定義では
//  ショーダウン限定の記述だった。§4-6「フォールド時は勝敗情報なし」との整合を優先し、
//  比較を伴わないフォールドでは同一動物判定自体を行わない、という解釈で実装した。
//  この構造上の曖昧さは報告書に明記する）
function finishRound(m, method, winnerOverride){
  const r = m.round;
  const ha = r.animalsPlayed.human, na = r.animalsPlayed.npc;
  let winner = null, tie = false;

  if (method==='fold'){
    winner = winnerOverride;
  } else if (ha === na){
    tie = true;
  } else {
    winner = (RANK_OF[m.trueAxis][ha] > RANK_OF[m.trueAxis][na]) ? 'human' : 'npc';
  }

  m.usedAnimals.human.push(ha);
  m.usedAnimals.npc.push(na);

  if (tie){
    log(m, `[R${m.roundNum}] 決着(ショーダウン・引き分け)：あなた=${ha} / NPC=${na} → 同一動物。ポット${m.pot}は持ち越し`);
    m.roundHistory.push({round:m.roundNum, humanAnimal:ha, npcAnimal:na, method:'showdown', tie:true, winner:null});
  } else {
    if (method!=='fold'){
      const winnerAnimal = winner==='human' ? ha : na;
      const loserAnimal = winner==='human' ? na : ha;
      commitConstraint(m, winnerAnimal, loserAnimal);
    }
    m.score[winner] += m.pot;
    log(m, `[R${m.roundNum}] 決着(${method==='fold'?'フォールド':'ショーダウン'})：あなた=${ha} / NPC=${na} → ${nameOf(winner)}の勝ち（ポット${m.pot}を得点化）`);
    m.roundHistory.push({round:m.roundNum, humanAnimal:ha, npcAnimal:na, method, tie:false, winner});
    m.pot = 0;
  }

  r.phase = 'resolved';
  if (m.chips.human<=0 || m.chips.npc<=0){
    finalizeByElimination(m, 'settlement');
  }
}

function finalizeByElimination(m, cause){
  const humanOut = m.chips.human<=0, npcOut = m.chips.npc<=0;
  m.endCause = 'elimination';
  if (humanOut && npcOut){
    if (m.score.human > m.score.npc) m.result='human_win';
    else if (m.score.npc > m.score.human) m.result='npc_win';
    else m.result='draw';
    log(m, `両者同時に命が尽きた（${cause}）。得点で裁定：あなた=${m.score.human} / NPC=${m.score.npc} → ${m.result==='draw'?'引き分け':(nameOf(m.result==='human_win'?'human':'npc')+'の勝ち')}`);
  } else if (humanOut){
    m.result='npc_win';
    log(m, `あなたの命が尽きた（${cause}）。NPCの勝ち。`);
  } else {
    m.result='human_win';
    log(m, `NPCの命が尽きた（${cause}）。あなたの勝ち。`);
  }
  m.matchOver = true;
  stopDrain();
}
function finalizeByScore(m){
  m.endCause = 'rounds_complete';
  if (m.score.human>m.score.npc) m.result='human_win';
  else if (m.score.npc>m.score.human) m.result='npc_win';
  else m.result='draw';
  m.matchOver = true;
  log(m, `8ラウンド終了。最終得点：あなた=${m.score.human} / NPC=${m.score.npc} → ${m.result==='draw'?'引き分け':(nameOf(m.result==='human_win'?'human':'npc')+'の勝ち')}`);
  stopDrain();
}
function advanceAfterResolution(m){
  if (m.matchOver) return;
  if (m.roundNum >= ROUNDS_TOTAL){
    finalizeByScore(m);
    return;
  }
  beginRound(m);
}

/* ---------------- 自動テスト ---------------- */
function ledgerTotal(m){
  return m.chips.human + m.chips.npc + m.pot + m.score.human + m.score.npc + m.vanished;
}
function setContainsAxis(set, axis){ return set.includes(axis); }
function checkInvariants(m, summary){
  const total = ledgerTotal(m);
  if (total !== INITIAL_LIFE*2) summary.ledgerViolations.push({total, round:m.roundNum});
  if (!setContainsAxis(m.candidateSetB, m.trueAxis)) summary.invariantViolations.push({side:'B', round:m.roundNum});
  if (!setContainsAxis(m.candidateSetA, m.trueAxis)) summary.invariantViolations.push({side:'A', round:m.roundNum});
}
function autoPlayOneMatch(index, summary){
  const seed = 'selftest-'+index+'-'+Math.floor(Math.random()*1e9);
  const m = newMatch(seed, 'off');
  m.seatTypes = { human:'NPC_AUTO', npc:'NPC_AUTO' };
  beginRound(m);
  checkInvariants(m, summary);
  let guard = 0;
  while (!m.matchOver){
    guard++;
    if (guard>20000) throw new Error('ガード上限到達（無限ループ疑い）');
    if (m.round && m.round.phase==='betting'){
      const opts = computeOptions(m);
      const decision = autoDecideAction(m, m.round.toAct, opts);
      submitAction(m, decision.action, decision.amount);
      checkInvariants(m, summary);
    } else {
      advanceAfterResolution(m);
      if (!m.matchOver) checkInvariants(m, summary);
    }
  }
  // ヒント整合チェック
  const seenSchedule = {};
  for (const ph of m.publicHints){
    if (ph.hint.axis !== m.trueAxis) summary.hintConsistencyViolations.push({match:index, reason:'axis-mismatch', round:ph.round});
    const sched = HINT_SCHEDULE[ph.round];
    if (!sched || sched.side !== ph.side || sched.tier !== ph.hint.tier){
      summary.hintConsistencyViolations.push({match:index, reason:'schedule-mismatch', round:ph.round});
    }
    if (!ph.hint.interp.includes(m.trueAxis)){
      summary.invariantViolations.push({side:'hint-interp', round:ph.round});
    }
    seenSchedule[ph.round] = (seenSchedule[ph.round]||0)+1;
  }
  const texts = m.publicHints.map(ph=>ph.hint.text);
  if (new Set(texts).size !== texts.length) summary.hintConsistencyViolations.push({match:index, reason:'duplicate-hint-text'});
  return { result: m.result, isDeathDecision: m.endCause==='elimination' };
}
function runSelfTest(n){
  const summary = {
    requested:n, completed:0, errorCount:0, errorSamples:[],
    ledgerViolations:[], hintConsistencyViolations:[], invariantViolations:[],
    results:{human_win:0, npc_win:0, draw:0}, deathDecisions:0,
  };
  for (let i=0;i<n;i++){
    try{
      const res = autoPlayOneMatch(i, summary);
      summary.completed++;
      summary.results[res.result] = (summary.results[res.result]||0)+1;
      if (res.isDeathDecision) summary.deathDecisions++;
    } catch(e){
      summary.errorCount++;
      if (summary.errorSamples.length<5) summary.errorSamples.push(String(e && e.message || e));
    }
  }
  return summary;
}

function safe(fn){
  return function(...args){
    try { fn(...args); } catch(e){ showError(e && e.message ? e.message : String(e)); }
  };
}

/* ---------------- 時間ドレイン（人間の入力待ちの間のみ進行） ---------------- */
function shouldDrainBeActive(m){
  if (!m || m.matchOver || !m.round) return false;
  if (!DRAIN_INTERVALS[m.drainSpeed]) return false;
  if (m.seatTypes.human !== 'HUMAN') return false;
  if (m.round.phase === 'select_cards') return true;
  if (m.round.phase === 'betting' && m.round.toAct === 'human') return true;
  return false;
}
function syncDrainState(){
  const shouldRun = shouldDrainBeActive(M);
  if (shouldRun && !drainTimer){
    drainTimer = setInterval(onDrainTick, DRAIN_INTERVALS[M.drainSpeed]);
  } else if (!shouldRun && drainTimer){
    clearInterval(drainTimer); drainTimer = null;
  }
}
function stopDrain(){
  if (drainTimer){ clearInterval(drainTimer); drainTimer = null; }
}
function onDrainTick(){
  if (!shouldDrainBeActive(M)){ stopDrain(); return; } // 安全ガード（§4-2と同種）
  M.chips.human -= 1;
  M.vanished += 1;
  log(M, `(ドレイン) あなたの命が1減少（残${M.chips.human}）`);
  if (M.chips.human <= 0){
    stopDrain();
    finalizeByElimination(M, 'drain');
  }
  render();
}

function afterStateChange(){
  render();
  syncDrainState();
  if (!M.matchOver && M.round && M.round.phase==='betting' && M.round.toAct==='npc'){
    scheduleNpcMove();
  }
}
function scheduleNpcMove(){
  const gen = GEN;
  setTimeout(()=>{
    if (gen !== GEN) return; // 非同期ガード
    if (!M || M.matchOver || !M.round || M.round.phase!=='betting' || M.round.toAct!=='npc') return;
    try{
      const opts = computeOptions(M);
      const decision = autoDecideAction(M, 'npc', opts);
      submitAction(M, decision.action, decision.amount);
    } catch(e){
      showError(e && e.message ? e.message : String(e));
    }
    afterStateChange();
  }, 380);
}

function startNewMatch(seedStr, drainSpeed){
  stopDrain();
  GEN++;
  M = newMatch(seedStr, drainSpeed);
  M.seatTypes = { human:'HUMAN', npc:'NPC_AUTO' };
  AXIS_MEMO = Array(AXES.length).fill(0);
  beginRound(M);
  abortArmed = false;
  afterStateChange();
}
function backToSetup(){
  stopDrain();
  GEN++;
  M = null;
  abortArmed = false;
  render();
}

/* ---------- DOM helper ---------- */
function el(tag, attrs, children){
  const e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(k=>{
    if (k==='class') e.className = attrs[k];
    else if (k==='html') e.innerHTML = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  (children||[]).forEach(c=>{ if (c!=null) e.appendChild(typeof c==='string' ? document.createTextNode(c) : c); });
  return e;
}

function formatSelfTestResult(res){
  const lines = [];
  lines.push(`完走: ${res.completed} / ${res.requested}`);
  lines.push(`エラー発生: ${res.errorCount}`);
  if (res.errorSamples.length) lines.push('エラー例: '+res.errorSamples.join(' | '));
  lines.push(`命・得点の勘定則違反: ${res.ledgerViolations.length}件`);
  lines.push(`ヒント整合違反: ${res.hintConsistencyViolations.length}件`);
  lines.push(`整合性不変条件違反: ${res.invariantViolations.length}件`);
  lines.push(`勝敗内訳: human_win=${res.results.human_win||0} / npc_win=${res.results.npc_win||0} / draw=${res.results.draw||0}（うち死亡決着=${res.deathDecisions}）`);
  return lines.join('\n');
}

    const resultText = last.tie ? '同一動物・引き分け（ポット持ち越し）' : `${nameOf(last.winner)}の勝ち（${last.method==='fold'?'フォールド':'ショーダウン'}）`;
    roundPanel.appendChild(el('h2', {}, ['決着']));
    roundPanel.appendChild(el('div', {class:'result-big'}, [`あなた=${last.humanAnimal} ／ NPC=${last.npcAnimal}　→　${resultText}`]));
    roundPanel.appendChild(renderBetLog(r));
    const nextLabel = (M.roundNum>=ROUNDS_TOTAL) ? '結果を見る' : '次のラウンドへ';
    roundPanel.appendChild(el('button', {class:'btn primary', onclick:safe(()=>{ advanceAfterResolution(M); afterStateChange(); })}, [nextLabel]));
  }
  wrap.appendChild(roundPanel);

  wrap.appendChild(renderAxisMemo());

  const toolsPanel = el('div', {class:'panel'});
  toolsPanel.appendChild(el('h2', {}, ['行動ログ']));
  toolsPanel.appendChild(el('div', {id:'log'}, [M.matchLog.join('\n')]));
  const toolsRow = el('div', {class:'row', style:'margin-top:10px;'});
  toolsRow.appendChild(el('button', {class:'btn', onclick:safe(copyLog)}, ['ログコピー']));
  toolsRow.appendChild(el('button', {class:'btn danger'+(abortArmed?' armed':''), onclick:safe(onAbortClick)}, [abortArmed ? '本当に中断？（4秒以内に再クリック）' : 'マッチを中断してシード画面に戻る']));
  toolsPanel.appendChild(toolsRow);
  wrap.appendChild(toolsPanel);

  return wrap;
}

function renderBetLog(r){
  const box = el('div', {class:'panel', style:'background:#161c22;'});
  box.appendChild(el('h2', {}, ['このラウンドのベット経過']));
  if (!r.history.length){ box.appendChild(el('p', {class:'sub'}, ['まだアクションはありません。'])); return box; }
  const lines = r.history.map(h=>{
    if (h.action==='check') return `${nameOf(h.player)}: チェック`;
    if (h.action==='bet') return `${nameOf(h.player)}: ベット ${h.amount}`;
    if (h.action==='call') return `${nameOf(h.player)}: コール ${h.amount}${h.allIn?'（オールイン）':''}`;
    if (h.action==='raise') return `${nameOf(h.player)}: レイズ +${h.amount}（支払${h.totalPaid}）`;
    if (h.action==='fold') return `${nameOf(h.player)}: フォールド`;
    return JSON.stringify(h);
  });
  box.appendChild(el('div', {style:'font-size:0.85rem; line-height:1.6;'}, [lines.join(' → ')]));
  return box;
}

function renderActionButtons(){
  const opts = computeOptions(M);
  const box = el('div', {class:'row', style:'margin-top:10px;'});
  if (opts.kind==='open'){
    box.appendChild(el('button', {class:'btn', onclick:safe(()=>{ submitAction(M,'check'); afterStateChange(); })}, ['チェック']));
    extractValues(opts.options,'bet').forEach(v=>{
      box.appendChild(el('button', {class:'btn primary', onclick:safe(()=>{ submitAction(M,'bet',v); afterStateChange(); })}, ['ベット '+v]));
    });
  } else {
    box.appendChild(el('button', {class:'btn danger', onclick:safe(()=>{ submitAction(M,'fold'); afterStateChange(); })}, ['フォールド']));
    const callLabel = opts.toCall > M.chips.human ? `コール（オールイン ${M.chips.human}）` : `コール ${opts.toCall}`;
    box.appendChild(el('button', {class:'btn primary', onclick:safe(()=>{ submitAction(M,'call'); afterStateChange(); })}, [callLabel]));
    extractValues(opts.options,'raise').forEach(v=>{
      box.appendChild(el('button', {class:'btn', onclick:safe(()=>{ submitAction(M,'raise',v); afterStateChange(); })}, ['レイズ +'+v]));
    });
  }
  return box;
}

function renderAxisMemo(){
  const box = el('div', {class:'panel'});
  box.appendChild(el('h2', {}, ['軸メモ（手動・自動推論なし）']));
  const row = el('div', {class:'axis-memo-row'});
  AXES.forEach((axis, i)=>{
    const state = AXIS_MEMO[i];
    const label = state===0 ? axis : (state===1 ? axis+' ×' : axis+' ○');
    const cls = 'axis-memo-cell' + (state===1?' x':(state===2?' o':''));
    row.appendChild(el('div', {class:cls, onclick:safe(()=>{
      AXIS_MEMO[i] = (AXIS_MEMO[i]+1)%3;
      render();
    })}, [label]));
  });
  box.appendChild(row);
  return box;
}

function renderEndScreen(){
  const wrap = el('div', {});
  wrap.appendChild(el('h1', {}, ['マッチ終了']));
  const msg = M.result==='draw' ? '引き分け' : (M.result==='human_win' ? 'あなたの勝ち！' : 'NPCの勝ち');
  const panel = el('div', {class:'panel'});
  panel.appendChild(el('div', {class:'result-big'}, [msg]));
  panel.appendChild(el('p', {}, [`決着理由：${M.endCause==='elimination' ? '命の枯渇' : '8ラウンド終了'}`]));
  panel.appendChild(el('p', {}, [`最終 命：あなた=${M.chips.human} ／ NPC=${M.chips.npc}　｜　最終 得点：あなた=${M.score.human} ／ NPC=${M.score.npc}`]));
  panel.appendChild(el('p', {class:'sub'}, [`シード: ${M.seed}（同一シードで再現可能）`]));
  panel.appendChild(el('button', {class:'btn primary', onclick:safe(()=>{ GEN++; M=null; render(); })}, ['シード画面に戻る']));
  wrap.appendChild(panel);

  const logPanel = el('div', {class:'panel'});
  logPanel.appendChild(el('h2', {}, ['行動ログ（このマッチ全文）']));
  logPanel.appendChild(el('div', {id:'log'}, [M.matchLog.join('\n')]));
  logPanel.appendChild(el('button', {class:'btn', style:'margin-top:10px;', onclick:safe(copyLog)}, ['ログコピー']));
  wrap.appendChild(logPanel);
  return wrap;
}

function copyLog(){
  const text = (M ? M.matchLog.join('\n') : '');
  const done = ()=> showToast('ログをコピーしました');
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=> fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, done){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{ document.execCommand('copy'); done(); }
  catch(e){ showError('ログのコピーに失敗しました: '+e.message); }
  document.body.removeChild(ta);
}

function onAbortClick(){
  if (!abortArmed){
    abortArmed = true;
    render();
    clearTimeout(abortTimer);
    abortTimer = setTimeout(()=>{ abortArmed=false; render(); }, 4000);
  } else {
    clearTimeout(abortTimer);
    backToSetup();
  }
}

render();
</script>
</body>
</html>
